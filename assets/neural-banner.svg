<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="Florian Lux Neural Banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070D"/>
      <stop offset="0.55" stop-color="#081022"/>
      <stop offset="1" stop-color="#060A12"/>
    </linearGradient>

    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7CFFB2" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#6EE7FF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#C084FC" stop-opacity="0.35"/>
    </linearGradient>

    <radialGradient id="glow" cx="45%" cy="40%" r="70%">
      <stop offset="0" stop-color="#6EE7FF" stop-opacity="0.18"/>
      <stop offset="0.6" stop-color="#7CFFB2" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#9AE6FF" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#glow)"/>

  <!-- Soft blobs -->
  <circle cx="210" cy="90" r="90" fill="#6EE7FF" opacity="0.08"/>
  <circle cx="985" cy="120" r="120" fill="#7CFFB2" opacity="0.06"/>
  <circle cx="760" cy="245" r="105" fill="#C084FC" opacity="0.05"/>

  <!-- Neural lines -->
  <g stroke="url(#neon)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.8">
    <path d="M160 220 C270 160 340 240 460 180"/>
    <path d="M160 220 C260 260 320 260 430 250"/>
    <path d="M260 120 C360 90 460 120 560 90"/>
    <path d="M260 120 C360 160 430 170 520 190"/>
    <path d="M460 180 C560 140 650 150 760 120"/>
    <path d="M430 250 C560 260 650 240 760 210"/>
    <path d="M560 90 C650 70 740 90 860 70"/>
    <path d="M520 190 C640 170 740 170 860 150"/>
    <path d="M760 120 C850 110 930 120 1030 95"/>
    <path d="M760 210 C850 230 940 220 1030 200"/>
    <path d="M860 70 C950 60 1040 70 1120 60"/>
    <path d="M860 150 C950 150 1040 150 1120 150"/>
  </g>

  <!-- Nodes -->
  <g>
    <g fill="#0B1428" stroke="#6EE7FF" stroke-opacity="0.8" stroke-width="1.3">
      <circle cx="260" cy="120" r="7"/>
      <circle cx="460" cy="180" r="7"/>
      <circle cx="560" cy="90" r="7"/>
      <circle cx="760" cy="120" r="7"/>
      <circle cx="860" cy="70" r="7"/>
      <circle cx="1030" cy="95" r="7"/>
      <circle cx="1120" cy="60" r="7"/>
    </g>
    <g fill="#0B1428" stroke="#7CFFB2" stroke-opacity="0.75" stroke-width="1.3">
      <circle cx="160" cy="220" r="7"/>
      <circle cx="430" cy="250" r="7"/>
      <circle cx="520" cy="190" r="7"/>
      <circle cx="760" cy="210" r="7"/>
      <circle cx="860" cy="150" r="7"/>
      <circle cx="1030" cy="200" r="7"/>
      <circle cx="1120" cy="150" r="7"/>
    </g>
  </g>

  <!-- Title block -->
  <text x="70" y="118" font-size="46" font-weight="800" fill="#EAF6FF"
        font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial">
    Florian Lux
  </text>

  <text x="70" y="154" font-size="18" font-weight="700" fill="#9AE6FF"
        font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial">
    Healthcare IT • AI Pipelines • Knowledge Systems • Pharmacology Tech Aesthetic
  </text>

  <text x="70" y="206" font-size="14" fill="#C7D2FE" opacity="0.92"
        font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial">
    Building Synapedia & NeuroCodex — structured knowledge platforms with modern web + AI enrichment.
  </text>

  <text x="70" y="231" font-size="14" fill="#A7F3D0" opacity="0.92"
        font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial">
    TypeScript • Next.js • Supabase • Cloudflare • Data Pipelines
  </text>

  <!-- Corner badge -->
  <rect x="975" y="22" width="205" height="36" rx="10" fill="#0B1428" stroke="#6EE7FF" stroke-opacity="0.35"/>
  <text x="995" y="46" font-size="14" font-weight="800" fill="#EAF6FF"
        font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial">
    Neural Banner • GitHub-safe
  </text>
</svg>
